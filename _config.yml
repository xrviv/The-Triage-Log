# The Site Configuration

# Import the theme
theme: jekyll-theme-chirpy

lang: en
timezone: # e.g., Asia/Manila or America/New_York (Leave blank or fill according to your locale)

# jekyll-seo-tag settings
# ↓ --------------------------

title: The Triage Log # Update your blog title

tagline: A technical writing log by Danny Garcia # Update your subtitle/tagline

description: >- 
  Deep dives into reverse engineering, forensics, reproducible builds, and blockchain tech.

url: "https://xrviv.github.io"
baseurl: "/The-Triage-Log"
paginate: 10

collections:
  tabs:
    output: true
    sort_by: order

github:
  username: xrviv 

twitter:
  username: dannybuntu # Your twitter handle (or leave blank/delete line if you don't use it)

social:
  name: Daniel Andrei R. Garcia # This fixes the copyright/footer name
  email: dannybuntu@proton.me 
  links:
    - https://github.com/xrviv # Your primary link

defaults:
  - scope:
      path: ""
      type: posts
    values:
      layout: post
  - scope:
      path: ""
      type: tabs
    values:
      permalink: /:title/
  - scope:
      path: ""
    values:
      layout: default

jekyll-archives:
  enabled: [categories, tags]
  layouts:
    category: category
    tag: tag
  permalinks:
    tag: /tags/:name/
    category: /categories/:name/

# Chirpy's default layout pipes every page through its bundled HTML minifier
# (_layouts/compress.html), which only preserves whitespace inside literal
# <pre>...</pre> tags. Chirpy's own code-block markup doesn't use <pre> (it's
# <div class="highlight"><code>...) so the minifier collapses every newline
# inside every code block on the site into a single space -- code stops being
# readable or copy-pasteable. Disabling compression sitewide fixes this for
# all posts, current and future.
compress_html:
  ignore:
    envs: 'all' # must be the bare string "all", not a list -- compress.html checks
                # `site.compress_html.ignore.envs == "all"` via direct equality
